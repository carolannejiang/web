<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Little Comic Project — Carolanne Jiang</title>
  <link rel="icon" type="image/x-icon" href="https://assets.squarespace.com/universal/default-favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Source Serif Pro', Georgia, serif;
      background: #ffffff;
      color: #111;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    .back-link {
      display: inline-block;
      padding: 24px 32px;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: lowercase;
      letter-spacing: 0.05em;
      color: #555;
      transition: color 0.2s;
    }
    .back-link:hover { color: #000; }
    .gallery {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 24px 80px;
    }
    .artwork {
      margin-bottom: 0;
    }
    .artwork img {
      width: 100%;
      height: auto;
      display: block;
    }
    .artwork.dark {
      background: #000;
      padding: 0;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
    }
    .artwork.dark img {
      max-width: 900px;
      margin: 0 auto;
    }
    @media (max-width: 600px) {
      .gallery { padding: 12px 16px 60px; }
      .artwork { margin-bottom: 0; }
    }
  </style>
</head>
<body>
  <a href="art.html" class="back-link">← back</a>
  <div class="gallery">
    <div class="artwork">
      <img src="https://images.squarespace-cdn.com/content/v1/660a366af698a851e4922f5f/30156cb2-96f1-477b-9eee-f10cb1b8ec06/Finding+-1+copy.jpg" alt="Finding page 1" loading="lazy">
    </div>
    <div class="artwork">

    </div>
    <div class="artwork">

    </div>
    <div class="artwork dark">
      <img src="https://images.squarespace-cdn.com/content/v1/660a366af698a851e4922f5f/d509faaa-c9e1-402f-96db-1c7d895d6d28/Finding+-4+copy.jpg" alt="Finding page 4" loading="lazy">

    <div class="artwork dark">

    <div class="artwork">

</body>
</html>
