name: Sync writings from Notion

on:
  # Poll Notion every hour. Cron is in UTC.
  schedule:
    - cron: "0 * * * *"
  # Also lets you run it on demand from the Actions tab ("Run workflow").
  workflow_dispatch:

# Needed so the job can commit the generated HTML back to the repo.
permissions:
  contents: write

# Don't let two runs push at the same time.
concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts/notion-sync
        run: npm install --no-audit --no-fund

      - name: Generate HTML from Notion
        working-directory: scripts/notion-sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node sync.mjs

      - name: Commit and push any changes
        run: |
          git config user.name "notion-sync[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Sync writings from Notion"
            git push
          fi
