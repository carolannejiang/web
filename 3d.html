  <style>
    .gallery {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 24px 80px;
    }
    .section {
      margin-bottom: 80px;
      display: flex;
      flex-direction: column;
    }
    .section h2 {
      order: 1;
      font-size: 1.3rem;
      font-weight: 700;
      margin-top: 20px;
    }
    /* Two-line caption, matching the paintings page typography */
    .section .artwork-info {
      order: 1;
      margin-top: 20px;
    }
    .section .artwork-info h3 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .section .artwork-info p {
      font-size: 0.95rem;
      font-weight: 500;
      color: #555;
    }
    .grid {
      display: grid;
      gap: 16px;
      margin-bottom: 16px;
    }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-6 { grid-template-columns: repeat(6, 1fr); }
    .grid img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      aspect-ratio: 3 / 4;
    }
    .grid-6 img { aspect-ratio: 1 / 1; }

    /* Masonry layout for Hands and Tea Sets */
    .masonry {
      column-count: 2;
      column-gap: 16px;
      margin-bottom: 16px;
    }
    .masonry img {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 16px;
      break-inside: avoid;
    }

    @media (max-width: 600px) {
      .gallery { padding: 12px 16px 60px; }
      .section { margin-bottom: 50px; }
      .grid-2, .grid-3, .grid-6 { grid-template-columns: 1fr; }
      .masonry { column-count: 1; }
      .section .artwork-info h3 { font-size: 1.1rem; }
    }
