  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #ffffff;
      font-family: 'Libre Baskerville', Georgia, serif;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      max-width: 700px;
      margin: 0 auto;
      width: 100%;
      padding: 0 60px;
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .side-menu {
      width: 100%;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 32px 60px 14px;
      border-bottom: 1px solid #c9c4bc;
    }

    .menu-right {
      display: flex;
      flex-direction: row;
      gap: 20px;
    }

    .side-menu a {
      font-size: 0.76rem;
      line-height: 1.4;
      color: #595959;
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .side-menu a:hover {
      color: #1a1a1a;
    }

    .art-hero {
      margin: 40px auto 0;
      max-width: 460px;
      width: 100%;
    }

    .art-hero img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 4px;
    }

    .art-links {
      margin: 34px auto 0;
      max-width: 460px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .art-links a {
      font-size: 0.95rem;
      line-height: 1.5;
      color: #1155cc;
      text-decoration: none;
    }

    .art-links a:hover {
      color: #0b3d91;
    }

    @media (max-width: 600px) {
      .side-menu { padding-left: 36px; padding-right: 36px; }
      .page { padding: 0 36px; }
      .art-hero { margin-top: 28px; }
      .art-links { margin-top: 28px; }
    }

  </style>

  <div class="side-menu" aria-label="Site links">
    <a href="index.html">home</a>

    <figure class="art-hero">

    </figure>

    <nav class="art-links" aria-label="Artwork">
      <a href="paintings.html">Painting</a>
      <a href="3d.html">Sculptures &amp; Ceramics</a>
      <a href="comic.html">a comic project</a>

    </nav>

  </main>
