  <link rel="icon" type="image/x-icon" href="https://assets.squarespace.com/universal/default-favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Work Sans', sans-serif;
      background: #f3f0eb;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    .back-link {
      display: inline-block;
      padding: 24px 32px;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: lowercase;
      letter-spacing: 0.05em;
      color: #555;
      transition: color 0.2s;
    }
    .back-link:hover { color: #000; }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 60px;
      padding: 20px 24px 80px;
      user-select: none;
    }
    .slideshow {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }
    .stage {
      position: relative;
      width: 100%;
      max-width: 500px;
      aspect-ratio: 3 / 2;
      cursor: pointer;
    }
    .stage img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .stage img.active { opacity: 1; }
    .counter {
      font-size: 0.85rem;
      color: #777;
      letter-spacing: 0.05em;
    }
    .caption {
      font-size: 0.9rem;
      color: #555;
      text-align: center;
      letter-spacing: 0.02em;
      min-height: 1.2em;
    }
    .slideshow-title {
      font-size: 1rem;
      font-weight: 700;
      color: #111;
      text-align: center;
      letter-spacing: 0.02em;
    }
    @media (max-width: 600px) {
      .container { gap: 40px; padding: 12px 16px 40px; }
    }
  </style>
</head>
<body>
  <a href="art.html" class="back-link">← back</a>
  <div class="container">

  <script>
    document.querySelectorAll('.slideshow').forEach((show) => {
      const stage = show.querySelector('.stage');
      const counter = show.querySelector('.counter');
      const caption = show.querySelector('.caption');
      const slides = stage.querySelectorAll('img');
      if (!slides.length) return;
      let i = 0;
      const update = (idx) => {
        slides[i].classList.remove('active');
        i = (idx + slides.length) % slides.length;
        slides[i].classList.add('active');
        counter.textContent = (i + 1) + ' / ' + slides.length;
        caption.textContent = slides[i].dataset.caption || '';
      };
      stage.addEventListener('click', () => update(i + 1));
    });
  </script>
